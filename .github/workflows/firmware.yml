name: firmware

# Builds the four debug-enabled firmware variants (STORY-3.2) from the pinned
# `micropython` submodule and, on a manual run against `main`, publishes them
# to a GitHub Release keyed on the micropython commit. Branch pushes only
# exercise the four build jobs (and their unix acceptance-test gate); the
# release job is gated to workflow_dispatch on main so branch iteration never
# publishes.

on:
  workflow_dispatch:
  push:
    branches: [main, ci-firmware]
    paths:
      - "micropython"
      - "mbm.toml"
      - ".github/workflows/firmware.yml"
      - "launcher/**"

permissions:
  contents: read

concurrency:
  group: firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: compute version metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      micropython_sha: ${{ steps.version.outputs.full_sha }}
      micropython_short_sha: ${{ steps.version.outputs.short_sha }}
      git_tag: ${{ steps.version.outputs.git_tag }}
      git_hash: ${{ steps.version.outputs.git_hash }}
      micropython_repo: ${{ steps.version.outputs.repo_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Compute micropython version info
        id: version
        # `git describe` needs release-tag history the shallow submodule
        # checkout doesn't have (fetch-depth 0 is unnecessary overhead just
        # for a version banner). Derive an equivalent, deterministic banner
        # instead: the exact commit (from the submodule pin itself, no fetch
        # required) plus the base version from py/mpconfig.h (the same
        # fallback source makeversionhdr.py itself uses when git history is
        # unavailable). Consumed by build jobs as MICROPY_GIT_TAG/HASH.
        run: |
          set -euo pipefail
          cd micropython
          full_sha=$(git rev-parse HEAD)
          short_sha=${full_sha:0:10}
          major=$(sed -n 's/^#define MICROPY_VERSION_MAJOR *//p' py/mpconfig.h)
          minor=$(sed -n 's/^#define MICROPY_VERSION_MINOR *//p' py/mpconfig.h)
          micro=$(sed -n 's/^#define MICROPY_VERSION_MICRO *//p' py/mpconfig.h)
          prerelease=$(sed -n 's/^#define MICROPY_VERSION_PRERELEASE *//p' py/mpconfig.h)
          tag="v${major}.${minor}.${micro}"
          if [ "${prerelease}" != "0" ]; then
            tag="${tag}-preview"
          fi
          repo_url=$(git config --get remote.origin.url)
          echo "full_sha=${full_sha}" | tee -a "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" | tee -a "$GITHUB_OUTPUT"
          echo "git_tag=${tag}" | tee -a "$GITHUB_OUTPUT"
          echo "git_hash=${short_sha}" | tee -a "$GITHUB_OUTPUT"
          echo "repo_url=${repo_url}" | tee -a "$GITHUB_OUTPUT"

  unix:
    name: unix (standard)
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      MICROPY_GIT_TAG: ${{ needs.setup.outputs.git_tag }}
      MICROPY_GIT_HASH: ${{ needs.setup.outputs.git_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Record toolchain versions
        run: |
          {
            echo "### unix toolchain"
            echo "- gcc: $(gcc --version | head -1)"
            echo "- glibc: $(ldd --version | head -1)"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Build unix (VARIANT=standard)
        run: |
          make -C micropython/ports/unix VARIANT=standard submodules
          make -C micropython/ports/unix VARIANT=standard

      - name: Hash artifact
        id: hash
        run: |
          sha256=$(sha256sum micropython/ports/unix/build-standard/micropython | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "unix sha256: ${sha256}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Stage release asset
        run: |
          mkdir -p out
          cp micropython/ports/unix/build-standard/micropython out/firmware-unix-standard

      - name: Write manifest fragment
        run: |
          mkdir -p fragments
          python3 .github/scripts/write_fragment.py \
            --id unix-standard-debug \
            --description "Unix port (VARIANT=standard), sys.settrace enabled with real local variable names, built from the mpy-debugpy integration branch." \
            --repo "${{ needs.setup.outputs.micropython_repo }}" \
            --source-commit "${{ needs.setup.outputs.micropython_sha }}" \
            --port unix \
            --board standard \
            --build-flags MICROPY_PY_SYS_SETTRACE=1 MICROPY_PY_SYS_SETTRACE_LOCALNAMES=1 \
            --artifact unix-standard-debug/micropython \
            --release-asset firmware-unix-standard \
            --artifact-sha256 "${{ steps.hash.outputs.sha256 }}" \
            --capabilities-note "Flags enabled by ports/unix/variants/standard/mpconfigvariant.h on the mpy-debugpy integration branch (no CFLAGS_EXTRA needed)." \
            --output fragments/unix-standard-debug.json

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firmware-unix-standard
          path: out/firmware-unix-standard
          if-no-files-found: error

      - name: Upload manifest fragment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest-fragment-unix-standard
          path: fragments/unix-standard-debug.json
          if-no-files-found: error

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Run host DAP test suite against the fresh artifact
        env:
          MPY_DEBUG_FIRMWARE: ${{ github.workspace }}/micropython/ports/unix/build-standard/micropython
        run: |
          make test || (
            echo "::warning::unix test suite failed once, retrying (known event-interleaving flake)"
            make test
          )

  rp2:
    name: rp2 (RPI_PICO_W)
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MICROPY_GIT_TAG: ${{ needs.setup.outputs.git_tag }}
      MICROPY_GIT_HASH: ${{ needs.setup.outputs.git_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            libstdc++-arm-none-eabi-dev \
            build-essential \
            ninja-build

      - name: Record toolchain versions
        run: |
          {
            echo "### rp2 toolchain"
            echo "- arm-none-eabi-gcc: $(arm-none-eabi-gcc --version | head -1)"
            echo "- cmake: $(cmake --version | head -1)"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Build rp2 (BOARD=RPI_PICO_W)
        run: |
          make -C micropython/ports/rp2 BOARD=RPI_PICO_W submodules
          make -C micropython/ports/rp2 BOARD=RPI_PICO_W

      - name: Hash artifact
        id: hash
        run: |
          sha256=$(sha256sum micropython/ports/rp2/build-RPI_PICO_W/firmware.uf2 | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "rp2 sha256: ${sha256}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Stage release asset
        run: |
          mkdir -p out
          cp micropython/ports/rp2/build-RPI_PICO_W/firmware.uf2 out/firmware-RPI_PICO_W.uf2

      - name: Write manifest fragment
        run: |
          mkdir -p fragments
          python3 .github/scripts/write_fragment.py \
            --id rp2-rpi-pico-w-debug \
            --description "rp2 port, BOARD=RPI_PICO_W, sys.settrace enabled with real local variable names." \
            --repo "${{ needs.setup.outputs.micropython_repo }}" \
            --source-commit "${{ needs.setup.outputs.micropython_sha }}" \
            --port rp2 \
            --board RPI_PICO_W \
            --build-flags MICROPY_PY_SYS_SETTRACE=1 MICROPY_PY_SYS_SETTRACE_LOCALNAMES=1 \
            --artifact rp2-rpi-pico-w-debug/firmware.uf2 \
            --release-asset firmware-RPI_PICO_W.uf2 \
            --artifact-sha256 "${{ steps.hash.outputs.sha256 }}" \
            --capabilities-note "Flags committed in boards/RPI_PICO_W/mpconfigboard.h on the debug_board_flags composition branch, not passed via CFLAGS_EXTRA." \
            --output fragments/rp2-rpi-pico-w-debug.json

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firmware-rp2-rpi-pico-w
          path: out/firmware-RPI_PICO_W.uf2
          if-no-files-found: error

      - name: Upload manifest fragment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest-fragment-rp2-rpi-pico-w
          path: fragments/rp2-rpi-pico-w-debug.json
          if-no-files-found: error

  stm32:
    name: stm32 (PYBD_SF6)
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MICROPY_GIT_TAG: ${{ needs.setup.outputs.git_tag }}
      MICROPY_GIT_HASH: ${{ needs.setup.outputs.git_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            build-essential

      - name: Record toolchain versions
        run: |
          {
            echo "### stm32 toolchain"
            echo "- arm-none-eabi-gcc: $(arm-none-eabi-gcc --version | head -1)"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Build mpy-cross
        run: make -C micropython/mpy-cross

      - name: Build stm32 (BOARD=PYBD_SF6)
        run: |
          make -C micropython/ports/stm32 BOARD=PYBD_SF6 submodules
          make -C micropython/ports/stm32 BOARD=PYBD_SF6

      - name: Hash artifact
        id: hash
        run: |
          sha256=$(sha256sum micropython/ports/stm32/build-PYBD_SF6/firmware.dfu | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "stm32 sha256: ${sha256}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Stage release asset
        run: |
          mkdir -p out
          cp micropython/ports/stm32/build-PYBD_SF6/firmware.dfu out/firmware-PYBD_SF6.dfu

      - name: Write manifest fragment
        run: |
          mkdir -p fragments
          python3 .github/scripts/write_fragment.py \
            --id stm32-pybd-sf6-debug \
            --description "stm32 port, BOARD=PYBD_SF6, sys.settrace enabled with real local variable names. Raw application image (TEXT0_ADDR 0x08008000): mboot must already be resident on the board; this artifact does not include or replace mboot." \
            --repo "${{ needs.setup.outputs.micropython_repo }}" \
            --source-commit "${{ needs.setup.outputs.micropython_sha }}" \
            --port stm32 \
            --board PYBD_SF6 \
            --build-flags MICROPY_PY_SYS_SETTRACE=1 MICROPY_PY_SYS_SETTRACE_LOCALNAMES=1 \
            --artifact stm32-pybd-sf6-debug/firmware.dfu \
            --release-asset firmware-PYBD_SF6.dfu \
            --artifact-sha256 "${{ steps.hash.outputs.sha256 }}" \
            --capabilities-note "Flags committed in boards/PYBD_SF6/mpconfigboard.h on the debug_board_flags composition branch, not passed via CFLAGS_EXTRA." \
            --notes "mboot must already be resident on the board (true for stock PYBD_SF6 hardware); this is the raw application firmware.dfu, not an mboot-inclusive image." \
            --output fragments/stm32-pybd-sf6-debug.json

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firmware-stm32-pybd-sf6
          path: out/firmware-PYBD_SF6.dfu
          if-no-files-found: error

      - name: Upload manifest fragment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest-fragment-stm32-pybd-sf6
          path: fragments/stm32-pybd-sf6-debug.json
          if-no-files-found: error

  esp32:
    name: esp32 (ESP32_GENERIC)
    needs: setup
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    container:
      image: espressif/idf:v5.3
    env:
      MICROPY_GIT_TAG: ${{ needs.setup.outputs.git_tag }}
      MICROPY_GIT_HASH: ${{ needs.setup.outputs.git_hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Install build tools
        # The espressif/idf image ships the ESP-IDF toolchain (cmake/ninja/
        # xtensa-gcc) but the micropython/ports/esp32 Makefile is a GNU Make
        # wrapper around idf.py, so `make` itself must be present.
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential

      - name: Build esp32 (BOARD=ESP32_GENERIC)
        # idf.py and the xtensa toolchain are only on PATH once export.sh is
        # sourced, and that has to happen in the same shell as the make
        # invocations that need it (GITHUB_ENV/GITHUB_PATH don't apply until
        # the *next* step).
        run: |
          . "$IDF_PATH/export.sh"
          {
            echo "### esp32 toolchain"
            echo "- IDF_VER: $(cat "$IDF_PATH/version.txt" 2>/dev/null || echo v5.3)"
            echo "- xtensa-esp32-elf-gcc: $(xtensa-esp32-elf-gcc --version | head -1)"
          } | tee -a "$GITHUB_STEP_SUMMARY"
          make -C micropython/mpy-cross
          make -C micropython/ports/esp32 BOARD=ESP32_GENERIC submodules
          make -C micropython/ports/esp32 BOARD=ESP32_GENERIC

      - name: Hash artifact
        id: hash
        run: |
          sha256=$(sha256sum micropython/ports/esp32/build-ESP32_GENERIC/firmware.bin | cut -d' ' -f1)
          echo "sha256=${sha256}" >> "$GITHUB_OUTPUT"
          echo "esp32 sha256: ${sha256}" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Stage release asset
        run: |
          mkdir -p out
          cp micropython/ports/esp32/build-ESP32_GENERIC/firmware.bin out/firmware-ESP32_GENERIC.bin

      - name: Write manifest fragment
        run: |
          mkdir -p fragments
          python3 .github/scripts/write_fragment.py \
            --id esp32-generic-debug \
            --description "esp32 port, BOARD=ESP32_GENERIC, sys.settrace enabled with real local variable names. Merged flash-from-0 image (bootloader + partition table + application)." \
            --repo "${{ needs.setup.outputs.micropython_repo }}" \
            --source-commit "${{ needs.setup.outputs.micropython_sha }}" \
            --port esp32 \
            --board ESP32_GENERIC \
            --build-flags MICROPY_PY_SYS_SETTRACE=1 MICROPY_PY_SYS_SETTRACE_LOCALNAMES=1 \
            --artifact esp32-generic-debug/firmware.bin \
            --release-asset firmware-ESP32_GENERIC.bin \
            --artifact-sha256 "${{ steps.hash.outputs.sha256 }}" \
            --capabilities-note "Flags committed in boards/ESP32_GENERIC/mpconfigboard.h on the debug_board_flags composition branch, not passed via CFLAGS_EXTRA." \
            --notes "Built with ESP-IDF v5.3 (espressif/idf:v5.3 container image)." \
            --output fragments/esp32-generic-debug.json

      - name: Upload firmware artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firmware-esp32-generic
          path: out/firmware-ESP32_GENERIC.bin
          if-no-files-found: error

      - name: Upload manifest fragment
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: manifest-fragment-esp32-generic
          path: fragments/esp32-generic-debug.json
          if-no-files-found: error

  release:
    name: publish Release
    needs: [setup, unix, rp2, stm32, esp32]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Download firmware artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: firmware-*
          path: dl/firmware
          merge-multiple: true

      - name: Download manifest fragments
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: manifest-fragment-*
          path: dl/fragments
          merge-multiple: true

      - name: Validate manifest fragments
        run: uv run launcher/gen_manifest.py --check --fragments-dir dl/fragments

      - name: Compute checksums
        run: |
          cd dl/firmware
          sha256sum firmware-unix-standard firmware-RPI_PICO_W.uf2 firmware-PYBD_SF6.dfu firmware-ESP32_GENERIC.bin > checksums.txt
          cat checksums.txt

      - name: Assemble manifest fragments
        env:
          TAG: fw-${{ needs.setup.outputs.micropython_short_sha }}
        run: |
          uv run launcher/gen_manifest.py \
            --fragments-dir dl/fragments \
            --repo-slug "${{ github.repository }}" \
            --tag "${TAG}" \
            --output dl/manifest-fragments.toml
          cat dl/manifest-fragments.toml

      - name: Write release notes
        env:
          MICROPY_SHA: ${{ needs.setup.outputs.micropython_sha }}
          MICROPY_REPO: ${{ needs.setup.outputs.micropython_repo }}
        run: |
          cat > dl/release-notes.md <<EOF
          Debug-enabled MicroPython firmware built from
          ${MICROPY_REPO} @ \`${MICROPY_SHA}\` (mpy-debugpy integration branch),
          composed via this repo at \`${GITHUB_SHA}\`.

          Variants: unix-standard-debug, rp2-rpi-pico-w-debug,
          stm32-pybd-sf6-debug, esp32-generic-debug. All four build with
          \`sys.settrace\` and real local-variable names
          (\`MICROPY_PY_SYS_SETTRACE\`, \`MICROPY_PY_SYS_SETTRACE_LOCALNAMES\`);
          \`set_local\` write-back is not built into any of them.
          Capability fields in the manifest are build intent, not a runtime
          behaviour guarantee - probe at session start (see firmware.toml's
          header note).

          **PYBD_SF6 note**: \`firmware-PYBD_SF6.dfu\` is the raw application
          image (TEXT0_ADDR 0x08008000). mboot must already be resident on
          the board; this asset does not include or replace mboot.

          \`checksums.txt\` holds the sha256 of each firmware asset;
          \`manifest-fragments.toml\` holds the corresponding
          \`firmware.toml\` \`[[variant]]\` entries (see
          \`launcher/gen_manifest.py\`).
          EOF
          cat dl/release-notes.md

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: fw-${{ needs.setup.outputs.micropython_short_sha }}
        run: |
          set -euo pipefail
          assets=(
            dl/firmware/firmware-unix-standard
            dl/firmware/firmware-RPI_PICO_W.uf2
            dl/firmware/firmware-PYBD_SF6.dfu
            dl/firmware/firmware-ESP32_GENERIC.bin
            dl/firmware/checksums.txt
            dl/manifest-fragments.toml
          )
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${assets[@]}" --repo "${{ github.repository }}" --clobber
            gh release edit "${TAG}" --repo "${{ github.repository }}" \
              --title "${TAG}" --notes-file dl/release-notes.md
          else
            gh release create "${TAG}" "${assets[@]}" --repo "${{ github.repository }}" \
              --title "${TAG}" --notes-file dl/release-notes.md
          fi
