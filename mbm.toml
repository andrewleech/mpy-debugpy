# micropython-branch-manager (mbm)
# Install: pip install micropython-branch-manager
#          or: uv tool install micropython-branch-manager
# Usage:   mbm --help
#
# Each integration branch is composed ONTO CURRENT UPSTREAM MASTER from the
# andrewleech debug-support branches (a merge of the settrace / debugpy PRs plus
# cherry-picked local-variable commits and integration fixes) — not a snapshot
# frozen at an old master. The composition is currently done by hand (merge +
# cherry-pick), so it is recorded here for provenance but is not yet reproducible
# via `mbm rebase` / `mbm add-pr`; wiring that is the upstreaming epic in
# planning/ROADMAP.md. Do not run `mbm rebase` expecting a clean rebuild yet.
#
# Published on the andrewleech forks (andrewleech/micropython @ mpy-debugpy,
# andrewleech/micropython-lib @ mpy-debugpy); .gitmodules points there, so
# `git clone --recurse-submodules` + `make bootstrap` reproduces the tree.

submodules = [
    { path = "micropython", integration_branch = "mpy-debugpy", branches = [
        { name = "pdb_support", pr_url = "https://github.com/micropython/micropython/pull/8767", title = "sys.settrace: gettrace, _getframe, f_trace (merged onto master)" },
        { name = "local_names_implementation", pr_url = "https://github.com/andrewleech/micropython/tree/local_names_implementation", title = "frame.f_locals + local-name preservation (cherry-picked locals commits)" },
    ] },
    { path = "micropython-lib", integration_branch = "mpy-debugpy", branches = [
        { name = "add-debugpy-support", pr_url = "https://github.com/micropython/micropython-lib/pull/1022", title = "debugpy DAP server + enhancements (merged onto master)" },
        { name = "mpy-debugpy-foundations", pr_url = "https://github.com/andrewleech/micropython-lib/tree/mpy-debugpy", title = "EPIC-1: DAP framing fix, wait_for_client, capability probe, read-only locals" },
    ] },
]
